<div class="row justify-content-center">
  <div class="col-lg-8">
    <div *ngIf="loading" class="text-center my-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Загрузка...</span>
      </div>
    </div>

    <div *ngIf="errorMessage" class="alert alert-warning text-center">
      <h4>😕 {{ errorMessage }}</h4>
      <a routerLink="/" class="btn btn-primary mt-3">Создать новую заметку</a>
    </div>

    <div *ngIf="note && !errorMessage" class="card shadow">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span>
          <strong>#{{ note.shortCode }}</strong>
          <span *ngIf="isExpired()" class="badge bg-danger ms-2">Истекла</span>
        </span>
        <small class="text-muted">Создано: {{ formatDate(note.createdAt) }}</small>
      </div>
      <div class="card-body">
        <div class="note-content">
          <markdown [data]="note.content"></markdown>
        </div>
        <div *ngIf="note.tags && note.tags.length > 0" class="mt-3">
          <span class="text-muted small">🏷️ Теги: </span>
          <span *ngFor="let tag of note.tags"
                class="badge bg-primary me-1"
                style="cursor: pointer"
                [routerLink]="['/my-notes']"
                [queryParams]="{ tag: tag.name }">
            #{{ tag.name }}
          </span>
        </div>
        <div *ngIf="note.expiresAt" class="mt-3 text-muted small">
          ⏰ Истекает: {{ formatDate(note.expiresAt) }}
        </div>
        <div *ngIf="!note.expiresAt" class="mt-3 text-muted small">
          ♾️ Никогда не истекает
        </div>
        <div class="mt-1 text-muted small">
          👁️ {{ note.viewCount }} просмотров
        </div>
      </div>
      <div class="card-footer d-flex gap-2">
        <a routerLink="/" class="btn btn-outline-primary btn-sm">Создать новую</a>
        <a *ngIf="!isExpired()" [routerLink]="['/edit', note.shortCode]" class="btn btn-outline-secondary btn-sm">
          ✏️ Редактировать
        </a>
      </div>
    </div>
  </div>
</div>
