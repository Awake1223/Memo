<div class="row justify-content-center">
  <div class="col-lg-10">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>📋 Мои заметки</h2>
      <a routerLink="/" class="btn btn-success">+ Создать</a>
    </div>

    <div *ngIf="loading" class="text-center my-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Загрузка...</span>
      </div>
    </div>

    <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

    <div *ngIf="!loading && notes.length === 0" class="text-center py-5">
      <h4>🤷 У вас пока нет заметок</h4>
      <a routerLink="/" class="btn btn-primary mt-3">Создать первую заметку</a>
    </div>

    <div class="list-group">
      <div *ngFor="let note of notes" class="list-group-item list-group-item-action">
        <div class="d-flex justify-content-between align-items-start">
          <div class="flex-grow-1 me-3">
            <div class="d-flex align-items-center gap-2">
              <strong>
                <a [routerLink]="['/note', note.shortCode]" class="text-decoration-none">
                  #{{ note.shortCode }}
                </a>
              </strong>
              <span class="badge"
                    [class.bg-success]="getStatusClass(note.expiresAt) === 'text-success'"
                    [class.bg-danger]="getStatusClass(note.expiresAt) === 'text-danger'">
                {{ getStatusLabel(note.expiresAt) }}
              </span>
            </div>
            <div class="text-muted small mt-1">{{ note.content }}</div>
            <div class="text-muted small">
              📅 {{ formatDate(note.createdAt) }}
              <span *ngIf="note.expiresAt">• ⏰ {{ formatDate(note.expiresAt) }}</span>
            </div>
          </div>
          <div class="btn-group">
            <a [routerLink]="['/note', note.shortCode]" class="btn btn-outline-primary btn-sm">👁️</a>
            <button class="btn btn-outline-danger btn-sm"
                    (click)="deleteNote(note.shortCode)"
                    [disabled]="deletingCode === note.shortCode">
              <span *ngIf="deletingCode === note.shortCode" class="spinner-border spinner-border-sm"></span>
              <span *ngIf="deletingCode !== note.shortCode">🗑️</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
